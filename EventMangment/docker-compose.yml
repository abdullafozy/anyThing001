services:
  mongo:
    image: mongo:7
    container_name: eventmanagement_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: eventmanagement_backend
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    networks:
      - app-network
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: eventmanagement_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge
